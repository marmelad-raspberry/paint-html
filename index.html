        function drawOverlay() {
            overlayCanvas.style.mixBlendMode = 'normal';
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            
            if (isDrawing && currentTool === 'line') {
                const activeSpec = getActiveSpecialColor();
                
                if (activeSpec === 'transparent' || currentTool === 'eraser') {
                    overlayCanvas.style.mixBlendMode = 'difference';
                    overlayCtx.globalCompositeOperation = 'source-over';
                    applyBresenham(overlayCtx, Math.floor(lineStartX), Math.floor(lineStartY), Math.floor(cursorX), Math.floor(cursorY));
                } else if (activeSpec === 'invert' || activeSpec === 'grayscale') {
                    strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);
                    applyBresenham(strokeCtx, Math.floor(lineStartX), Math.floor(lineStartY), Math.floor(cursorX), Math.floor(cursorY));
                    
                    overlayCtx.globalCompositeOperation = activeSpec === 'invert' ? 'difference' : 'color';
                    overlayCtx.drawImage(strokeCanvas, 0, 0);
                    
                    // ENMASCARAR transparencia de la capa activa en el preview
                    overlayCtx.globalCompositeOperation = 'destination-in';
                    overlayCtx.drawImage(canvas, 0, 0);
                    
                    overlayCtx.globalCompositeOperation = 'source-over';
                } else {
                    applyBresenham(overlayCtx, Math.floor(lineStartX), Math.floor(lineStartY), Math.floor(cursorX), Math.floor(cursorY));
                    overlayCtx.globalCompositeOperation = 'source-over';
                }
            }

            if (isDrawing && currentTool === 'gradient') {
                overlayCtx.beginPath();
                overlayCtx.moveTo(lineStartX, lineStartY);
                overlayCtx.lineTo(cursorX, cursorY);
                overlayCtx.strokeStyle = 'white';
                overlayCtx.lineWidth = 2 / scale;
                overlayCtx.stroke();
                
                overlayCtx.beginPath();
                overlayCtx.arc(lineStartX, lineStartY, 6/scale, 0, Math.PI*2);
                overlayCtx.fillStyle = gradientColor1;
                overlayCtx.fill();
                overlayCtx.stroke();
                
                overlayCtx.beginPath();
                overlayCtx.arc(cursorX, cursorY, 6/scale, 0, Math.PI*2);
                overlayCtx.fillStyle = gradientColor2;
                overlayCtx.fill();
                overlayCtx.stroke();
            }

            if (selection.state === 'selecting') {
                selectionBox.style.display = 'block';
                selectionBox.style.left = Math.min(selection.startX, cursorX) + 'px';
                selectionBox.style.top = Math.min(selection.startY, cursorY) + 'px';
                selectionBox.style.width = Math.abs(cursorX - selection.startX) + 'px';
                selectionBox.style.height = Math.abs(cursorY - selection.startY) + 'px';
            } else { selectionBox.style.display = 'none'; }

            if (selection.state === 'floating' && selection.w > 0 && selection.h > 0) {
                overlayCtx.imageSmoothingEnabled = false;
                try { overlayCtx.drawImage(selection.canvas, selection.x, selection.y, selection.w, selection.h); } catch (e) {}
                overlayCtx.strokeStyle = 'rgba(0, 120, 255, 0.8)'; overlayCtx.lineWidth = 2 / scale; 
                overlayCtx.strokeRect(selection.x, selection.y, selection.w, selection.h);
                
                const hs = 12 / scale; overlayCtx.fillStyle = 'white'; overlayCtx.strokeStyle = 'blue';
                const drawHandle = (x, y) => {
                    overlayCtx.fillRect(x - hs/2, y - hs/2, hs, hs); overlayCtx.strokeRect(x - hs/2, y - hs/2, hs, hs);
                };
                drawHandle(selection.x, selection.y); drawHandle(selection.x + selection.w, selection.y); 
                drawHandle(selection.x, selection.y + selection.h); drawHandle(selection.x + selection.w, selection.y + selection.h); 
                drawHandle(selection.x + selection.w / 2, selection.y); drawHandle(selection.x + selection.w / 2, selection.y + selection.h); 
                drawHandle(selection.x, selection.y + selection.h / 2); drawHandle(selection.x + selection.w, selection.y + selection.h / 2); 
            }
        }

        function getSelectionHit(x, y) {
            const hs = 20 / scale; const isInside = (hx, hy) => Math.abs(x - hx) <= hs && Math.abs(y - hy) <= hs;
            if (isInside(selection.x, selection.y)) return 'resize-tl';
            if (isInside(selection.x + selection.w, selection.y)) return 'resize-tr';
            if (isInside(selection.x, selection.y + selection.h)) return 'resize-bl';
            if (isInside(selection.x + selection.w, selection.y + selection.h)) return 'resize-br';
            if (isInside(selection.x + selection.w / 2, selection.y)) return 'resize-t';
            if (isInside(selection.x + selection.w / 2, selection.y + selection.h)) return 'resize-b';
            if (isInside(selection.x, selection.y + selection.h / 2)) return 'resize-l';
            if (isInside(selection.x + selection.w, selection.y + selection.h / 2)) return 'resize-r';
            if (x >= Math.min(selection.x, selection.x + selection.w) && x <= Math.max(selection.x, selection.x + selection.w) && 
                y >= Math.min(selection.y, selection.y + selection.h) && y <= Math.max(selection.y, selection.y + selection.h)) return 'move';
            return 'outside';
        }

        function applyBresenham(context, x0, y0, x1, y1) {
            let dx = Math.abs(x1 - x0); let dy = Math.abs(y1 - y0);
            let sx = (x0 < x1) ? 1 : -1; let sy = (y0 < y1) ? 1 : -1;
            let err = dx - dy;
            let offsetX = Math.floor(brushCanvas.width / 2);
            let offsetY = Math.floor(brushCanvas.height / 2);
            while (true) {
                context.drawImage(brushCanvas, x0 - offsetX, y0 - offsetY);
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
        }

        function moveCursor(deltaX, deltaY) {
            let oldX = cursorX; let oldY = cursorY;
            cursorX = Math.max(0, Math.min(canvas.width, cursorX + deltaX));
            cursorY = Math.max(0, Math.min(canvas.height, cursorY + deltaY));
            updateCursorPosition();

            const isScrollable = (canvas.width * scale > container.clientWidth) || (canvas.height * scale > container.clientHeight);
            if (isScrollable) { 
                const PAN_MARGIN = 50; const screenX = (cursorX * scale) + translateX; const screenY = (cursorY * scale) + translateY;
                let updateCam = false;
                if (screenX < PAN_MARGIN) { translateX += (PAN_MARGIN - screenX); updateCam = true; }
                else if (screenX > container.clientWidth - PAN_MARGIN) { translateX -= (screenX - (container.clientWidth - PAN_MARGIN)); updateCam = true; }
                if (screenY < PAN_MARGIN) { translateY += (PAN_MARGIN - screenY); updateCam = true; }
                else if (screenY > container.clientHeight - PAN_MARGIN) { translateY -= (screenY - (container.clientHeight - PAN_MARGIN)); updateCam = true; }
                if (updateCam) updateZoomLayer(); 
            }

            if (isDrawing) {
                // Sonido de dibujo contínuo
                if (Date.now() - lastDrawSound > 50 && (currentTool === 'brush' || currentTool === 'eraser' || currentTool === 'text-brush' || currentTool === 'sticker')) {
                    sfx.play('drawing');
                    lastDrawSound = Date.now();
                }

                if (currentTool === 'brush' || currentTool === 'eraser' || currentTool === 'text-brush' || currentTool === 'sticker') {
                    
                    if (isRainbow && (currentTool === 'brush' || currentTool === 'text-brush' || (currentTool === 'sticker' && chkStickerColor.checked))) {
                        rainbowHue = (rainbowHue + 10) % 360;
                        if (currentTool === 'text-brush' || currentTool === 'sticker') {
                            generateBrush();
                        } else {
                            brushCtx.globalCompositeOperation = 'source-in';
                            brushCtx.fillStyle = `hsl(${rainbowHue}, 100%, 50%)`;
                            brushCtx.fillRect(0, 0, brushSize, brushSize);
                            brushCtx.globalCompositeOperation = 'source-over';
                        }
                    }

                    const activeSpec = getActiveSpecialColor();

                    if (activeSpec === 'invert' || activeSpec === 'grayscale') {
                        applyBresenham(strokeCtx, Math.floor(oldX), Math.floor(oldY), Math.floor(cursorX), Math.floor(cursorY));
                        
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(snapshotCanvas, 0, 0);
                        
                        ctx.globalCompositeOperation = activeSpec === 'invert' ? 'difference' : 'color';
                        ctx.drawImage(strokeCanvas, 0, 0);
                        
                        // MÁSCARA para no afectar píxeles transparentes
                        ctx.globalCompositeOperation = 'destination-in';
                        ctx.drawImage(snapshotCanvas, 0, 0);

                        ctx.globalCompositeOperation = 'source-over';
                    } else {
                        if (currentTool === 'eraser' || activeSpec === 'transparent') ctx.globalCompositeOperation = 'destination-out';
                        applyBresenham(ctx, Math.floor(oldX), Math.floor(oldY), Math.floor(cursorX), Math.floor(cursorY));
                        ctx.globalCompositeOperation = 'source-over'; 
                    }

                } else if (currentTool === 'line' || currentTool === 'gradient') {
                    drawOverlay(); 
                } else if (currentTool === 'select') {
                    if (selection.state === 'selecting') drawOverlay();
                    else if (selection.state === 'floating') {
                        if (selection.action === 'move') { selection.x = cursorX - selection.dragOffsetX; selection.y = cursorY - selection.dragOffsetY; }
                        else if (selection.action === 'resize-tl') { let nw = selection.startRect.w + (selection.startRect.x - cursorX); let nh = selection.startRect.h + (selection.startRect.y - cursorY); if (nw < 1) { nw = 1; cursorX = selection.startRect.x + selection.startRect.w - 1; } if (nh < 1) { nh = 1; cursorY = selection.startRect.y + selection.startRect.h - 1; } selection.w = nw; selection.h = nh; selection.x = cursorX; selection.y = cursorY; }
                        else if (selection.action === 'resize-tr') { let nw = cursorX - selection.startRect.x; let nh = selection.startRect.h + (selection.startRect.y - cursorY); if (nw < 1) { nw = 1; cursorX = selection.startRect.x + 1; } if (nh < 1) { nh = 1; cursorY = selection.startRect.y + selection.startRect.h - 1; } selection.w = nw; selection.h = nh; selection.y = cursorY; }
                        else if (selection.action === 'resize-bl') { let nw = selection.startRect.w + (selection.startRect.x - cursorX); let nh = cursorY - selection.startRect.y; if (nw < 1) { nw = 1; cursorX = selection.startRect.x + selection.startRect.w - 1; } if (nh < 1) { nh = 1; cursorY = selection.startRect.y + 1; } selection.w = nw; selection.h = nh; selection.x = cursorX; }
                        else if (selection.action === 'resize-br') { let nw = cursorX - selection.startRect.x; let nh = cursorY - selection.startRect.y; if (nw < 1) { nw = 1; cursorX = selection.startRect.x + 1; } if (nh < 1) { nh = 1; cursorY = selection.startRect.y + 1; } selection.w = nw; selection.h = nh; }
                        else if (selection.action === 'resize-t') { let nh = selection.startRect.h + (selection.startRect.y - cursorY); if (nh < 1) { nh = 1; cursorY = selection.startRect.y + selection.startRect.h - 1; } selection.h = nh; selection.y = cursorY; }
                        else if (selection.action === 'resize-b') { let nh = cursorY - selection.startRect.y; if (nh < 1) { nh = 1; cursorY = selection.startRect.y + 1; } selection.h = nh; }
                        else if (selection.action === 'resize-l') { let nw = selection.startRect.w + (selection.startRect.x - cursorX); if (nw < 1) { nw = 1; cursorX = selection.startRect.x + selection.startRect.w - 1; } selection.w = nw; selection.x = cursorX; }
                        else if (selection.action === 'resize-r') { let nw = cursorX - selection.startRect.x; if (nw < 1) { nw = 1; cursorX = selection.startRect.x + 1; } selection.w = nw; }
                        drawOverlay();
                    }
                }
            }
        }

        function getPinchDistance(touches) { return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY); }
        function getPinchCenter(touches) { return { x: (touches[0].clientX + touches[1].clientX) / 2, y: (touches[0].clientY + touches[1].clientY) / 2 }; }

        function updateZoomLayer() {
            if (scale < 1) scale = 1;
            translateX = Math.max(Math.min(0, container.clientWidth - (canvas.width * scale)), Math.min(0, translateX));
            translateY = Math.max(Math.min(0, container.clientHeight - (canvas.height * scale)), Math.min(0, translateY));
            zoomLayer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            if (currentTool === 'select') drawOverlay(); updateCursorPosition();
        }

        container.addEventListener('touchstart', (e) => {
            initAudio();
            const touches = e.targetTouches; 
            if (touches.length === 2 && !isDrawing) { initialPinchDistance = getPinchDistance(touches); lastPinchCenter = getPinchCenter(touches); } 
            else if (touches.length === 1) { lastTouchX = touches[0].clientX; lastTouchY = touches[0].clientY; }
        });

        container.addEventListener('touchmove', (e) => {
            e.preventDefault(); const touches = e.targetTouches;
            if (touches.length === 2 && !isDrawing) {
                const currentDistance = getPinchDistance(touches); const currentCenter = getPinchCenter(touches);
                if (initialPinchDistance) {
                    let newScale = Math.max(1, Math.min(scale * (currentDistance / initialPinchDistance), 10));
                    translateX -= (currentCenter.x - translateX) * (newScale / scale - 1); translateY -= (currentCenter.y - translateY) * (newScale / scale - 1);
                    translateX += currentCenter.x - lastPinchCenter.x; translateY += currentCenter.y - lastPinchCenter.y;
                    scale = newScale; updateZoomLayer();
                }
                initialPinchDistance = currentDistance; lastPinchCenter = currentCenter;
            } else if (touches.length === 1 && lastTouchX !== null && lastTouchY !== null) {
                moveCursor((touches[0].clientX - lastTouchX) / scale, (touches[0].clientY - lastTouchY) / scale);
                lastTouchX = touches[0].clientX; lastTouchY = touches[0].clientY;
            }
        }, { passive: false });

        container.addEventListener('touchend', (e) => {
            if (e.targetTouches.length === 0) { lastTouchX = null; lastTouchY = null; initialPinchDistance = null; } 
            else if (e.targetTouches.length === 1) { lastTouchX = e.targetTouches[0].clientX; lastTouchY = e.targetTouches[0].clientY; }
        });

        function hideKeyboard() {
            if (document.activeElement && typeof document.activeElement.blur === 'function') {
                document.activeElement.blur();
            }
        }

        function performDrawStart() {
            hideKeyboard(); 
            initAudio();
            
            if (!layers[activeLayerIndex].visible) {
                alert("No puedes dibujar en una capa oculta.");
                return;
            }

            if (currentTool === 'picker') { pickColor(cursorX, cursorY); return; }
            
            if (currentTool === 'text-brush') sfx.play('text');
            else if (currentTool === 'sticker') sfx.play('sticker');

            if (currentTool === 'line' || currentTool === 'gradient') {
                sfx.play('drawStart');
                saveState();
                lineStartX = cursorX;
                lineStartY = cursorY;
                isDrawing = true;
                
                // Asegurar que tenemos el snapshot de la capa antes de dibujar para el fix de transparencia
                snapshotCtx.clearRect(0, 0, canvas.width, canvas.height);
                snapshotCtx.drawImage(canvas, 0, 0);

                if (currentTool === 'gradient') {
                    buildFloodFillMask(Math.floor(cursorX), Math.floor(cursorY));
                } else if (isRainbow) {
                    rainbowHue = (rainbowHue + 10) % 360;
                    brushCtx.globalCompositeOperation = 'source-in';
                    brushCtx.fillStyle = `hsl(${rainbowHue}, 100%, 50%)`;
                    brushCtx.fillRect(0, 0, brushSize, brushSize);
                    brushCtx.globalCompositeOperation = 'source-over';
                }
                return;
            }

            if (currentTool === 'select') {
                if (selection.state === 'floating') {
                    const hit = getSelectionHit(cursorX, cursorY);
                    if (hit === 'outside') { commitSelection(); selection.state = 'selecting'; selection.startX = cursorX; selection.startY = cursorY; } 
                    else if (hit === 'move') { selection.action = 'move'; selection.dragOffsetX = cursorX - selection.x; selection.dragOffsetY = cursorY - selection.y; } 
                    else { selection.action = hit; selection.startRect = {x: selection.x, y: selection.y, w: selection.w, h: selection.h}; }
                } else { selection.state = 'selecting'; selection.startX = cursorX; selection.startY = cursorY; }
                isDrawing = true; updateCursorPosition(); return;
            }

            saveState(); 
            if (currentTool === 'fill') {
                sfx.play('fill');
                const activeSpec = getActiveSpecialColor();
                let fillColArr;

                const startX = Math.floor(cursorX);
                const startY = Math.floor(cursorY);

                if (activeSpec === 'transparent') {
                    fillColArr = [0, 0, 0, 0];
                } else if (activeSpec === 'invert' || activeSpec === 'grayscale') {
                    const startPos = (startY * canvas.width + startX) * 4;
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const sr = imageData.data[startPos];
                    const sg = imageData.data[startPos + 1];
                    const sb = imageData.data[startPos + 2];
                    const sa = imageData.data[startPos + 3];

                    if (activeSpec === 'invert') {
                        fillColArr = [255 - sr, 255 - sg, 255 - sb, sa];
                    } else { // grayscale
                        const gray = Math.round(0.299 * sr + 0.587 * sg + 0.114 * sb);
                        fillColArr = [gray, gray, gray, sa];
                    }
                } else {
                    const fillCol = isRainbow ? `hsl(${rainbowHue}, 100%, 50%)` : currentColor;
                    fillColArr = colorToRgbaArray(fillCol);
                }

                floodFill(startX, startY, fillColArr);
                if (isRainbow) rainbowHue = (rainbowHue + 45) % 360; 
                updateActiveLayerThumbnail();
                return;
            }

            isDrawing = true;
            sfx.play('drawStart');

            if (isRainbow && (currentTool === 'brush' || currentTool === 'text-brush' || (currentTool === 'sticker' && chkStickerColor.checked))) {
                rainbowHue = (rainbowHue + 10) % 360;
                if (currentTool === 'text-brush' || currentTool === 'sticker') {
                    generateBrush();
                } else {
                    brushCtx.globalCompositeOperation = 'source-in';
                    brushCtx.fillStyle = `hsl(${rainbowHue}, 100%, 50%)`;
                    brushCtx.fillRect(0, 0, brushSize, brushSize);
                    brushCtx.globalCompositeOperation = 'source-over';
                }
            }

            const activeSpec = getActiveSpecialColor();
            
            if (activeSpec === 'invert' || activeSpec === 'grayscale') {
                snapshotCtx.clearRect(0, 0, canvas.width, canvas.height);
                snapshotCtx.drawImage(canvas, 0, 0);
                strokeCtx.clearRect(0, 0, canvas.width, canvas.height);
                
                applyBresenham(strokeCtx, Math.floor(cursorX), Math.floor(cursorY), Math.floor(cursorX), Math.floor(cursorY));
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(snapshotCanvas, 0, 0);
                
                ctx.globalCompositeOperation = activeSpec === 'invert' ? 'difference' : 'color';
                ctx.drawImage(strokeCanvas, 0, 0);
                
                // MÁSCARA para no afectar píxeles transparentes
                ctx.globalCompositeOperation = 'destination-in';
                ctx.drawImage(snapshotCanvas, 0, 0);

                ctx.globalCompositeOperation = 'source-over';
            } else {
                if (currentTool === 'eraser' || activeSpec === 'transparent') ctx.globalCompositeOperation = 'destination-out';
                applyBresenham(ctx, Math.floor(cursorX), Math.floor(cursorY), Math.floor(cursorX), Math.floor(cursorY));
                ctx.globalCompositeOperation = 'source-over';
            }
        }

        function performDrawEnd() {
            if (!isDrawing) return;
            isDrawing = false;
            
            if (currentTool === 'line') {
                sfx.play('lineEnd');
                const activeSpec = getActiveSpecialColor();
                if (activeSpec === 'invert' || activeSpec === 'grayscale') {
                    strokeCtx.clearRect(0, 0, canvas.width, canvas.height);
                    applyBresenham(strokeCtx, Math.floor(lineStartX), Math.floor(lineStartY), Math.floor(cursorX), Math.floor(cursorY));
                    
                    // Restaurar capa antes de aplicar la recta final
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(snapshotCanvas, 0, 0);

                    ctx.globalCompositeOperation = activeSpec === 'invert' ? 'difference' : 'color';
                    ctx.drawImage(strokeCanvas, 0, 0);
                    
                    // MÁSCARA para no pintar lo transparente de la capa
                    ctx.globalCompositeOperation = 'destination-in';
                    ctx.drawImage(snapshotCanvas, 0, 0);

                    ctx.globalCompositeOperation = 'source-over';
                } else {
                    if (currentTool === 'eraser' || activeSpec === 'transparent') ctx.globalCompositeOperation = 'destination-out';
                    applyBresenham(ctx, Math.floor(lineStartX), Math.floor(lineStartY), Math.floor(cursorX), Math.floor(cursorY));
                    ctx.globalCompositeOperation = 'source-over';
                }
                drawOverlay(); 
                updateCursorPosition();
                updateActiveLayerThumbnail();
                return;
            }

            if (currentTool === 'gradient') {
                sfx.play('gradient');
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                
                let destX = cursorX; let destY = cursorY;
                if (lineStartX === destX && lineStartY === destY) destX += 1; 

                const grad = tempCtx.createLinearGradient(lineStartX, lineStartY, destX, destY);
                grad.addColorStop(0, gradientColor1);
                grad.addColorStop(1, gradientColor2);
                
                tempCtx.fillStyle = grad;
                tempCtx.fillRect(0, 0, canvas.width, canvas.height);
                
                tempCtx.globalCompositeOperation = 'destination-in';
                tempCtx.drawImage(gradientMaskCanvas, 0, 0);
                
                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(tempCanvas, 0, 0);
                
                drawOverlay();
                updateCursorPosition();
                updateActiveLayerThumbnail();
                return;
            }

            if (currentTool === 'select') {
                if (selection.state === 'selecting') {
                    let sx = Math.floor(Math.min(selection.startX, cursorX)); let sy = Math.floor(Math.min(selection.startY, cursorY));
                    let sw = Math.max(1, Math.floor(Math.abs(cursorX - selection.startX))); let sh = Math.max(1, Math.floor(Math.abs(cursorY - selection.startY)));
                    
                    if (sw > 2 && sh > 2) { 
                        sfx.play('select');
                        saveState(); selection.x = sx; selection.y = sy; selection.w = sw; selection.h = sh;
                        selection.canvas.width = sw; selection.canvas.height = sh;
                        const sCtx = selection.canvas.getContext('2d'); sCtx.imageSmoothingEnabled = false;
                        try {
                            sCtx.drawImage(canvas, sx, sy, sw, sh, 0, 0, sw, sh);
                            ctx.clearRect(sx, sy, sw, sh); 
                            if (activeLayerIndex === 0) {
                                ctx.fillStyle = '#f5f5f5'; ctx.fillRect(sx, sy, sw, sh); 
                            }
                            selection.state = 'floating';
                        } catch (e) { selection.state = 'none'; undoStack.pop(); }
                    } else { selection.state = 'none'; }
                    drawOverlay(); updateSelectionButtons();
                } else if (selection.state === 'floating') { selection.action = null; drawOverlay(); }
                updateCursorPosition();
            }
            
            updateActiveLayerThumbnail();
        }

        drawBtn.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            sfx.play('click');
            drawBtn.classList.add('active-press');
            setTimeout(() => drawBtn.classList.remove('active-press'), 100);
            performDrawStart(); 
        }, { passive: false });
        drawBtn.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            performDrawEnd(); 
        });

        container.addEventListener('mousedown', (e) => {
            initAudio();
            lastTouchX = e.clientX; lastTouchY = e.clientY;
            const onMouseMove = (me) => {
                if (lastTouchX !== null && lastTouchY !== null) moveCursor((me.clientX - lastTouchX) / scale, (me.clientY - lastTouchY) / scale);
                lastTouchX = me.clientX; lastTouchY = me.clientY;
            };
            const onMouseUp = () => { window.removeEventListener('mousemove', onMouseMove); lastTouchX = null; lastTouchY = null; };
            window.addEventListener('mousemove', onMouseMove); window.addEventListener('mouseup', onMouseUp, { once: true });
        });

        drawBtn.addEventListener('mousedown', (e) => {
            e.preventDefault(); 
            sfx.play('click');
            drawBtn.classList.add('active-press');
            setTimeout(() => drawBtn.classList.remove('active-press'), 100);
            performDrawStart();
        });
        window.addEventListener('mouseup', performDrawEnd);

        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = ''; 
        });

        setTool('brush');
    if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA lista:', reg.scope))
                    .catch(err => console.log('Error PWA:', err));
            });
        }
    </script>
